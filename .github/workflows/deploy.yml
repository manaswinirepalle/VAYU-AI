name: Deploy to Render

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Procfile'
      - 'requirements.txt'
      - 'runtime.txt'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Render
        run: |
          curl https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }} -X POST
        if: secrets.RENDER_SERVICE_ID != '' && secrets.RENDER_API_KEY != ''
      
      - name: Notify - No credentials
        if: secrets.RENDER_SERVICE_ID == '' || secrets.RENDER_API_KEY == ''
        run: echo "Render deployment skipped - add RENDER_SERVICE_ID and RENDER_API_KEY secrets to GitHub"
